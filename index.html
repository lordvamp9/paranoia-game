<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PARANOIA</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; cursor: none; }
  #game { display: block; width: 100%; height: 100%; }
  #menu {
    position: absolute; inset: 0; background: #000; z-index: 50;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace; color: #888; cursor: default;
  }
  #menu h1 {
    font-size: 64px; letter-spacing: 24px; color: #b8b8b8; font-weight: normal;
    text-shadow: 0 0 18px rgba(160,160,180,0.35); margin: 0 0 8px 24px;
    animation: flicker 4s infinite;
  }
  @keyframes flicker {
    0%, 93%, 100% { opacity: 1; }
    94% { opacity: 0.4; }
    95% { opacity: 1; }
    97% { opacity: 0.2; }
    98% { opacity: 1; }
  }
  #menu .sub { font-size: 13px; letter-spacing: 6px; color: #444; margin-bottom: 60px; }
  #menu button {
    background: none; border: 1px solid #333; color: #999; font-family: inherit;
    font-size: 18px; letter-spacing: 8px; padding: 14px 48px; cursor: pointer; margin: 6px;
  }
  #menu button:hover { border-color: #888; color: #ddd; background: rgba(255,255,255,0.03); }
  #menu .controls { margin-top: 50px; font-size: 11px; color: #3a3a3a; letter-spacing: 2px; line-height: 1.9; text-align: center; }
  #menu .brand { position: absolute; bottom: 18px; font-size: 10px; letter-spacing: 4px; color: #2a2a2a; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="menu">
  <h1>PARANOIA</h1>
  <div class="sub">YOU ARE BEING OBSERVED</div>
  <button id="btn-start">BEGIN</button>
  <div class="controls">
    WASD — MOVE&nbsp;&nbsp;&nbsp;MOUSE — LOOK&nbsp;&nbsp;&nbsp;SHIFT — RUN<br>
    F — FLASHLIGHT&nbsp;&nbsp;&nbsp;E — INTERACT&nbsp;&nbsp;&nbsp;ESC — RELEASE MOUSE<br><br>
    HEADPHONES STRONGLY RECOMMENDED
  </div>
  <div class="brand">vamp9 — MMXXVI</div>
</div>
<script type="module" src="./src/game.js"></script>
</body>
</html>
